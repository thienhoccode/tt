<svg width="200" height="50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50">
  <!-- Book icon -->
  <g id="book-icon">
    <!-- Left page -->
    <rect x="5" y="8" width="12" height="20" fill="#4f46e5" rx="2"/>
    <!-- Right page -->
    <rect x="17" y="8" width="12" height="20" fill="#06b6d4" rx="2"/>
    <!-- Spine/binding -->
    <rect x="15" y="8" width="2" height="20" fill="#1e293b"/>
    <!-- Page lines on left -->
    <line x1="7" y1="12" x2="13" y2="12" stroke="#ffffff" stroke-width="0.8" opacity="0.7"/>
    <line x1="7" y1="16" x2="13" y2="16" stroke="#ffffff" stroke-width="0.8" opacity="0.7"/>
    <line x1="7" y1="20" x2="13" y2="20" stroke="#ffffff" stroke-width="0.8" opacity="0.7"/>
    <!-- Page lines on right -->
    <line x1="19" y1="12" x2="25" y2="12" stroke="#ffffff" stroke-width="0.8" opacity="0.7"/>
    <line x1="19" y1="16" x2="25" y2="16" stroke="#ffffff" stroke-width="0.8" opacity="0.7"/>
    <line x1="19" y1="20" x2="25" y2="20" stroke="#ffffff" stroke-width="0.8" opacity="0.7"/>
  </g>
  
  <!-- Text: BookVerse -->
  <text x="38" y="28" font-family="Be Vietnam Pro, Arial" font-size="20" font-weight="700" fill="#4f46e5">BookVerse</text>
</svg>